<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoleStreet | Contact</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="contact">
  <header class="site-header">
    <div class="container nav-wrap">
      <a href="index.html" class="logo">SoleStreet</a>
      <nav id="primary-nav" class="site-nav">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
        <a href="cart.html" class="cart-link">Cart <span class="cart-count">0</span></a>
      </nav>
      <div class="nav-actions">
        <button class="theme-toggle" aria-label="Toggle theme">Dark Mode</button>
        <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="primary-nav">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <h1>Contact Us</h1>
      <p class="subtext">Send us your question and we will reply quickly.</p>
      <form class="contact-form" id="contact-form">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit" class="btn">Send Message</button>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 SoleStreet. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
