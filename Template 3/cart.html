<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoleStreet | Cart</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="cart">
  <header class="site-header">
    <div class="container nav-wrap">
      <a href="index.html" class="logo">SoleStreet</a>
      <nav id="primary-nav" class="site-nav">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html" class="cart-link active">Cart <span class="cart-count">0</span></a>
      </nav>
      <div class="nav-actions">
        <button class="theme-toggle" aria-label="Toggle theme">Dark Mode</button>
        <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="primary-nav">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <h1>Your Cart</h1>
      <div id="cart-items"></div>
      <div id="cart-summary" class="cart-summary hidden">
        <p>Subtotal: <strong id="cart-subtotal">$0.00</strong></p>
        <button id="checkout-btn" class="btn">Checkout</button>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 SoleStreet. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
